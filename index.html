<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#09090b" />
  <meta name="description" content="FinNotes — Gestão financeira com estética ultra-moderna." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>FinNotes</title>
  
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --z: #09090b; --z1: #111113; --z2: #18181b; --z3: #1f1f23;
      --z4: #27272a; --z5: #3f3f46;
      --t1: #fafafa; --t2: #a1a1aa; --t3: #71717a;
      --ac: #3b82f6; --ac-glow: rgba(59, 130, 246, 0.5);
      --ok: #22c55e; --warn: #f59e0b;
      --r-xl: 32px; --r-lg: 24px; --r-md: 16px;
      --glass: rgba(24, 24, 27, 0.7);
      --blur: blur(12px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body { 
      background: var(--z); 
      color: var(--t1); 
      font-family: 'Geist', sans-serif; 
      min-height: 100dvh; 
      overflow-x: hidden;
      background-image: radial-gradient(circle at top right, #1d4ed815, transparent),
                        radial-gradient(circle at bottom left, #1e1b4b15, transparent);
    }

    #root { max-width: 480px; margin: 0 auto; padding: 20px 16px 120px; }

    /* Animações Surreais */
    @keyframes slideIn { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes glow { 0%, 100% { box-shadow: 0 0 20px -5px var(--ac-glow); } 50% { box-shadow: 0 0 35px 2px var(--ac-glow); } }
    
    .card-enter { animation: slideIn 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
    
    /* Scrollbar Minimalista */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--z4); border-radius: 10px; }

    .glass-panel {
      background: var(--glass);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    input, select, textarea {
      background: var(--z1) !important;
      border: 1px solid var(--z4) !important;
      color: var(--t1) !important;
      padding: 14px 16px !important;
      border-radius: var(--r-md) !important;
      font-size: 16px !important; /* Evita zoom no iOS */
      transition: all 0.2s ease;
    }

    input:focus { border-color: var(--ac) !important; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15) !important; }

    .btn-primary {
      background: var(--ac);
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: var(--r-md);
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-primary:active { transform: scale(0.96); opacity: 0.9; }

    .fab {
      position: fixed;
      bottom: 32px;
      right: 24px;
      width: 64px;
      height: 64px;
      border-radius: 22px;
      background: var(--ac);
      box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 90;
      animation: glow 3s infinite;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback } = React;

    const STORAGE_KEY = 'finnotes_v4_lux';
    const CATS = [
      { id:'Alimentação', icon:'🍽️', color:'#fb923c' },
      { id:'Saúde', icon:'💊', color:'#22d3ee' },
      { id:'Lazer', icon:'🎮', color:'#a78bfa' },
      { id:'Infra', icon:'🏠', color:'#34d399' },
      { id:'Outros', icon:'📦', color:'#94a3b8' }
    ];

    const fmt = v => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);

    /* ── Componente Dashboard ── */
    const Dashboard = ({ notes }) => {
      const stats = useMemo(() => {
        const total = notes.reduce((acc, n) => acc + n.valorJuros, 0);
        const pago = notes.reduce((acc, n) => {
          const count = Object.keys(n.paidMap || {}).length;
          return acc + (count * (n.valorJuros / n.parcelas));
        }, 0);
        return { total, pago, pendente: total - pago, prog: (pago/total)*100 || 0 };
      }, [notes]);

      return (
        <div className="glass-panel" style={{ padding: 28, borderRadius: 'var(--r-xl)', marginBottom: 32 }}>
          <span style={{ fontSize: 12, color: 'var(--t3)', fontWeight: 600, textTransform: 'uppercase', letterSpacing: 2 }}>Saldo Comprometido</span>
          <div style={{ fontSize: 38, fontWeight: 800, margin: '8px 0 24px', letterSpacing: -1 }}>{fmt(stats.total)}</div>
          
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
            <div style={{ background: 'rgba(34, 197, 94, 0.1)', padding: 16, borderRadius: 'var(--r-md)' }}>
              <div style={{ fontSize: 11, color: 'var(--ok)', fontWeight: 600 }}>PAGO</div>
              <div style={{ fontSize: 16, fontWeight: 700 }}>{fmt(stats.pago)}</div>
            </div>
            <div style={{ background: 'rgba(245, 158, 11, 0.1)', padding: 16, borderRadius: 'var(--r-md)' }}>
              <div style={{ fontSize: 11, color: 'var(--warn)', fontWeight: 600 }}>PENDENTE</div>
              <div style={{ fontSize: 16, fontWeight: 700 }}>{fmt(stats.pendente)}</div>
            </div>
          </div>

          <div style={{ marginTop: 24, height: 8, background: 'var(--z4)', borderRadius: 99, overflow: 'hidden' }}>
            <div style={{ height: '100%', background: 'var(--ac)', width: `${stats.prog}%`, transition: 'width 1s cubic-bezier(0.34, 1.56, 0.64, 1)' }} />
          </div>
        </div>
      );
    };

    /* ── Componente NoteCard ── */
    const NoteCard = ({ note, onToggle, onDelete }) => {
      const [expanded, setExpanded] = useState(false);
      const paidCount = Object.keys(note.paidMap || {}).length;
      const progress = (paidCount / note.parcelas) * 100;

      return (
        <div className="glass-panel card-enter" style={{ padding: 20, borderRadius: 'var(--r-lg)', marginBottom: 16, borderLeft: `4px solid ${getCatColor(note.categoria)}` }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
            <div onClick={() => setExpanded(!expanded)} style={{ flex: 1, cursor: 'pointer' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
                <span style={{ fontWeight: 600, fontSize: 16 }}>{note.nome}</span>
                <span style={{ fontSize: 10, background: 'var(--z3)', padding: '2px 8px', borderRadius: 99, color: 'var(--t2)' }}>{note.categoria}</span>
              </div>
              <div style={{ fontSize: 14, color: 'var(--t2)', fontFamily: 'var(--fm)' }}>
                {note.parcelas}x de {fmt(note.valorJuros/note.parcelas)}
              </div>
            </div>
            <button onClick={() => onDelete(note.id)} style={{ background: 'transparent', border: 'none', color: 'var(--t3)', padding: 8 }}>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            </button>
          </div>

          <div style={{ marginTop: 12, display: 'flex', alignItems: 'center', gap: 10 }}>
            <div style={{ flex: 1, height: 4, background: 'var(--z4)', borderRadius: 99 }}>
              <div style={{ height: '100%', background: progress === 100 ? 'var(--ok)' : 'var(--ac)', width: `${progress}%`, transition: 'all 0.4s' }} />
            </div>
            <span style={{ fontSize: 10, color: 'var(--t3)', fontWeight: 600 }}>{paidCount}/{note.parcelas}</span>
          </div>

          {expanded && (
            <div style={{ marginTop: 16, display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 8, animation: 'slideIn 0.3s ease' }}>
              {Array.from({ length: note.parcelas }).map((_, i) => {
                const key = `p${i}`;
                const isPaid = !!note.paidMap[key];
                return (
                  <button 
                    key={i}
                    onClick={() => onToggle(note.id, key)}
                    style={{ 
                      padding: '8px 0', borderRadius: 10, border: 'none', fontSize: 10, fontWeight: 700,
                      background: isPaid ? 'var(--ok)' : 'var(--z3)',
                      color: isPaid ? 'white' : 'var(--t3)',
                      transition: 'all 0.2s'
                    }}>
                    {i + 1}º
                  </button>
                );
              })}
            </div>
          )}
        </div>
      );
    };

    /* ── App Principal ── */
    function App() {
      const [notes, setNotes] = useState(() => JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
      const [isModalOpen, setIsModalOpen] = useState(false);

      useEffect(() => { localStorage.setItem(STORAGE_KEY, JSON.stringify(notes)); }, [notes]);

      const handleAdd = (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const valorReal = parseFloat(fd.get('valorReal'));
        const parcelas = parseInt(fd.get('parcelas'));
        
        const newNote = {
          id: Date.now().toString(),
          nome: fd.get('nome'),
          categoria: fd.get('categoria'),
          valorReal,
          parcelas,
          valorJuros: valorReal * (1 + (0.02 * parcelas)), // Exemplo 2% juros simples
          paidMap: {},
          data: fd.get('data')
        };

        setNotes([newNote, ...notes]);
        setIsModalOpen(false);
      };

      const togglePaid = (id, key) => {
        setNotes(notes.map(n => {
          if (n.id === id) {
            const newMap = { ...n.paidMap };
            if (newMap[key]) delete newMap[key];
            else newMap[key] = true;
            return { ...n, paidMap: newMap };
          }
          return n;
        }));
      };

      return (
        <div>
          <header style={{ padding: '20px 0 32px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div>
              <h1 style={{ fontSize: 24, fontWeight: 800, letterSpacing: -1.5 }}>Fin<span style={{ color: 'var(--ac)' }}>Notes</span></h1>
              <p style={{ fontSize: 12, color: 'var(--t3)', fontWeight: 500 }}>{new Date().toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' })}</p>
            </div>
            <div style={{ width: 40, height: 40, borderRadius: 12, background: 'var(--z2)', border: '1px solid var(--z4)' }}></div>
          </header>

          <Dashboard notes={notes} />

          <div style={{ marginBottom: 20, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <h2 style={{ fontSize: 14, color: 'var(--t2)', textTransform: 'uppercase', letterSpacing: 1 }}>Atividade Recente</h2>
          </div>

          {notes.map(n => (
            <NoteCard key={n.id} note={n} onToggle={togglePaid} onDelete={(id) => setNotes(notes.filter(x => x.id !== id))} />
          ))}

          {/* Botão Flutuante (FAB) */}
          <button className="fab" onClick={() => setIsModalOpen(true)}>
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>

          {/* Modal Surreal */}
          {isModalOpen && (
            <div className="glass-panel" style={{ position: 'fixed', inset: 0, zIndex: 100, padding: 24, display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'rgba(0,0,0,0.8)' }}>
              <form onSubmit={handleAdd} className="glass-panel" style={{ width: '100%', maxWidth: 400, padding: 32, borderRadius: var(--r-xl), display: 'flex', flexDirection: 'column', gap: 20 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <h2 style={{ fontSize: 20, fontWeight: 700 }}>Nova Anotação</h2>
                  <button type="button" onClick={() => setIsModalOpen(false)} style={{ background: 'none', border: 'none', color: 'var(--t3)' }}>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                  </button>
                </div>
                
                <input name="nome" placeholder="O que comprou?" required />
                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                  <input name="valorReal" type="number" step="0.01" placeholder="Valor R$" required />
                  <input name="parcelas" type="number" placeholder="Parcelas" defaultValue="1" required />
                </div>
                <select name="categoria">
                  {CATS.map(c => <option key={c.id} value={c.id}>{c.icon} {c.id}</option>)}
                </select>
                <input name="data" type="date" defaultValue={new Date().toISOString().split('T')[0]} />
                
                <button type="submit" className="btn-primary" style={{ justifyContent: 'center', marginTop: 10 }}>Confirmar Registro</button>
              </form>
            </div>
          )}
        </div>
      );
    }

    function getCatColor(id) { return CATS.find(c => c.id === id)?.color || '#fff'; }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
