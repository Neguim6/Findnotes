<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0d0d0f" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <title>FinNotes Pro</title>
</head>
<body>
    <div id="lock-screen" style="position: fixed; inset: 0; background: #0d0d0f; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;">
        <div style="width: 100%; max-width: 320px; text-align: center;">
            <h1 style="color:white; margin-bottom: 8px; font-family: sans-serif;">FinNotes <span style="color:#3b82f6">Pro</span></h1>
            <input type="password" id="main-login-pwd" placeholder="SENHA" style="text-align: center; letter-spacing: 8px; font-size: 22px; width: 100%; padding: 15px; background: #1a1a20; border: 1px solid #2a2a35; color: white; border-radius: 12px; margin-bottom: 20px;">
            <button onclick="checkLogin()" class="btn-save" style="width: 100%; justify-content: center; background:#3b82f6; color:white; border:none; padding:15px; border-radius:12px; cursor:pointer; font-weight:bold;">ACESSAR</button>
        </div>
    </div>

    <div id="app" class="app-shell" style="display: none;">
        <header class="app-header">
            <div class="header-inner">
                <div class="logo"><span class="logo-icon">💠</span> FinNotes <em>Pro</em></div>
                <button onclick="logout()" class="btn-clear" style="padding: 5px 12px; font-size: 12px;">Sair</button>
            </div>
        </header>

        <main class="main-content">
            <div class="dashboard">
                <div class="total-card">
                    <div class="card-label">Total em Aberto</div>
                    <div id="total-geral" class="card-value">R$ 0,00</div>
                    <div class="card-sub" id="status-pagamento">0 parcelas restantes</div>
                    <div class="card-glow"></div>
                </div>
            </div>

            <section>
                <div class="section-header">
                    <h2>Novo Registro</h2>
                    <div class="section-line"></div>
                </div>
                <div class="form-card">
                    <div class="form-grid">
                        <div class="field-group col-span-2">
                            <label>Descrição</label>
                            <input type="text" id="in-nome" placeholder="Ex: Servidor Dell">
                        </div>
                        <div class="field-group">
                            <label>Valor Total</label>
                            <input type="number" id="in-valor" step="0.01" placeholder="0,00">
                        </div>
                        <div class="field-group">
                            <label>Parcelas</label>
                            <input type="number" id="in-parcelas" value="1" min="1">
                        </div>
                        <div class="field-group col-span-2">
                            <label>Categoria</label>
                            <select id="in-cat">
                                <option value="infraestrutura">🏠 Infraestrutura</option>
                                <option value="hardware">💻 Hardware</option>
                                <option value="assinatura">🔄 Assinatura</option>
                                <option value="saude">🏥 Saúde</option>
                                <option value="lazer">🎨 Lazer</option>
                                <option value="outros">📦 Outros</option>
                            </select>
                        </div>
                        <div class="field-group col-span-2">
                            <label>Data Vencimento</label>
                            <input type="date" id="in-data">
                        </div>
                    </div>
                    <div class="form-actions">
                        <button onclick="saveNote()" class="btn-save"><span class="btn-icon">+</span> Gravar</button>
                    </div>
                </div>
            </section>

            <section>
                <div class="section-header">
                    <h2>Registros</h2>
                    <div class="section-line"></div>
                </div>
                <div id="alert-banner" class="alert-banner" style="display:none; margin-bottom: 15px;"></div>
                <div id="notes-list" class="notes-list"></div>
            </section>
        </main>
    </div>

    <div class="modal" id="modal-edit">
        <div class="modal-box">
            <h3 style="margin-bottom:15px;">Editar Parcelas</h3>
            <div class="field-group">
                <label>Parcelas Já Pagas</label>
                <input type="number" id="edit-pagas" min="0">
            </div>
            <div style="margin-top:20px; display:flex; flex-direction:column; gap:10px;">
                <button onclick="saveEdit()" class="btn-save" style="width:100%; justify-content:center;">Salvar Alteração</button>
                <button onclick="closeModal('modal-edit')" class="btn-clear" style="width:100%;">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
