<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinNotes — Ultra Modern</title>
    <style>
        :root {
            --bg: #09090b;
            --surface: #121214;
            --card: #18181b;
            --accent: #3b82f6;
            --text: #ffffff;
            --text-dim: #a1a1aa;
            --radius: 20px;
            --glass: rgba(24, 24, 27, 0.7);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at top right, #1d4ed810, transparent);
        }

        #app { width: 100%; max-width: 480px; padding: 24px; position: relative; }

        /* Header */
        .header { margin-bottom: 32px; }
        .header h1 { font-size: 28px; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .header span { color: var(--accent); }

        /* Dashboard */
        .dashboard {
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 24px;
            border-radius: 24px;
            margin-bottom: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .stats-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; }
        .stats-value { font-size: 36px; font-weight: 800; margin: 8px 0; }

        /* Note Card */
        .card {
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 18px;
            border-radius: var(--radius);
            margin-bottom: 16px;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .card-title { font-weight: 600; font-size: 16px; }
        .card-price { color: var(--accent); font-weight: 700; }

        .progress-container { height: 6px; background: #27272a; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }

        /* FAB - Floating Button */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 64px;
            height: 64px;
            background: var(--accent);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
            cursor: pointer;
            border: none;
            color: white;
            font-size: 32px;
            transition: transform 0.2s;
            z-index: 99;
        }
        .fab:active { transform: scale(0.9); }

        /* Modal */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--surface);
            width: 100%;
            max-width: 400px;
            padding: 30px;
            border-radius: 28px;
            border: 1px solid var(--card);
        }

        input {
            width: 100%;
            background: var(--bg);
            border: 1px solid #27272a;
            padding: 14px;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
        }

        .btn-confirm {
            background: var(--accent);
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="app">
        <header class="header">
            <h1>Fin<span>Notes</span></h1>
            <p style="color: var(--text-dim); margin-top: 4px;">Controle de Investimentos</p>
        </header>

        <div class="dashboard">
            <div class="stats-label">Total Comprometido</div>
            <div class="stats-value" id="total-val">R$ 0,00</div>
            <div style="font-size: 13px; color: var(--text-dim);">Dica: Toque no card para pagar uma parcela.</div>
        </div>

        <div id="notes-list">
            </div>

        <button class="fab" onclick="toggleModal(true)">+</button>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 style="margin-top:0">Novo Registro</h2>
            <input type="text" id="in-nome" placeholder="Descrição (ex: iPhone 15)">
            <input type="number" id="in-valor" placeholder="Valor Total (R$)">
            <input type="number" id="in-parcelas" placeholder="Número de Parcelas">
            <button class="btn-confirm" onclick="saveNote()">Adicionar Despesa</button>
            <button onclick="toggleModal(false)" style="background:none; border:none; color:var(--text-dim); width:100%; margin-top:15px; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <script>
        let notes = JSON.parse(localStorage.getItem('finnotes_v5') || '[]');

        function toggleModal(show) {
            document.getElementById('modal').classList.toggle('active', show);
        }

        function saveNote() {
            const nome = document.getElementById('in-nome').value;
            const valor = parseFloat(document.getElementById('in-valor').value);
            const parcelas = parseInt(document.getElementById('in-parcelas').value);

            if (!nome || !valor) return alert('Preencha os campos!');

            const newNote = {
                id: Date.now(),
                nome,
                valor,
                parcelas,
                pagas: 0
            };

            notes.unshift(newNote);
            localStorage.setItem('finnotes_v5', JSON.stringify(notes));
            render();
            toggleModal(false);
            
            // Limpar campos
            document.getElementById('in-nome').value = '';
            document.getElementById('in-valor').value = '';
            document.getElementById('in-parcelas').value = '';
        }

        function toggleParcela(id) {
            notes = notes.map(n => {
                if (n.id === id) {
                    n.pagas = n.pagas < n.parcelas ? n.pagas + 1 : 0;
                }
                return n;
            });
            localStorage.setItem('finnotes_v5', JSON.stringify(notes));
            render();
        }

        function render() {
            const list = document.getElementById('notes-list');
            const totalDisplay = document.getElementById('total-val');
            list.innerHTML = '';
            
            let totalGeral = 0;

            notes.forEach(n => {
                totalGeral += n.valor;
                const progresso = (n.pagas / n.parcelas) * 100;
                
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => toggleParcela(n.id);
                card.innerHTML = `
                    <div class="card-header">
                        <span class="card-title">${n.nome}</span>
                        <span class="card-price">R$ ${n.valor.toFixed(2)}</span>
                    </div>
                    <div style="font-size: 12px; color: var(--text-dim)">
                        Parcelas: ${n.pagas} de ${n.parcelas}
                    </div>
                    <div class="progress-container">
                        <div class="progress-bar" style="width: ${progresso}%"></div>
                    </div>
                `;
                list.appendChild(card);
            });

            totalDisplay.innerText = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(totalGeral);
        }

        // Inicializar
        render();
    </script>
</body>
</html>
