<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>FinNotes v12.0</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --z: #09090b; --z1: #111113; --z2: #18181b; --z3: #1f1f23;
            --z4: #27272a; --t1: #fafafa; --t2: #a1a1aa; --t3: #71717a; 
            --ac: #3b82f6; --ok: #22c55e; --err: #ef4444;
            --r: 16px; --ff: 'Segoe UI', Roboto, sans-serif;
        }

        body { background: var(--z); color: var(--t1); font-family: var(--ff); min-height: 100dvh; display: flex; justify-content: center; overflow-x: hidden; }
        #lock-screen { position: fixed; inset: 0; background: var(--z); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #app { width: 100%; max-width: 500px; padding: 15px 15px 120px 15px; display: none; }

        #install-row { display: none; background: var(--z2); padding: 15px; border-radius: var(--r); margin-bottom: 20px; border: 1px solid var(--ac); align-items: center; justify-content: space-between; animation: slideIn 0.5s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .dashboard { background: var(--z2); padding: 25px; border-radius: var(--r); border: 1px solid var(--z3); margin-bottom: 20px; }
        .total-valor { font-size: 36px; font-weight: 800; letter-spacing: -1px; margin: 5px 0; }

        .card-container { position: relative; margin-bottom: 12px; border-radius: var(--r); background: var(--err); }
        .card { background: var(--z2); border: 1px solid var(--z3); border-radius: var(--r); padding: 20px 90px 20px 20px; position: relative; z-index: 2; cursor: pointer; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); touch-action: pan-y; }
        .card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 5px; background: var(--color); border-radius: var(--r) 0 0 var(--r); }
        .card.completed { opacity: 0.4; }

        .btn-del-fixo { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: rgba(239, 68, 68, 0.15); color: var(--err); border: 1px solid rgba(239, 68, 68, 0.3); padding: 10px 12px; border-radius: 10px; font-size: 10px; font-weight: 900; z-index: 10; }
        .progress-bg { height: 8px; background: var(--z3); border-radius: 99px; margin-top: 15px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--ac); transition: width 0.8s ease; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; padding: 20px; z-index: 9999; backdrop-filter: blur(10px); }
        .modal.active { display: flex; }
        input, select { width: 100%; background: var(--z1); border: 1px solid var(--z4); border-radius: 12px; color: var(--t1); padding: 16px; margin-top: 12px; outline: none; font-size: 16px; }

        .fab { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); width: 68px; height: 68px; background: var(--ac); color: white; border-radius: 22px; border: none; font-size: 36px; z-index: 100; cursor: pointer; }
    </style>
</head>
<body>
    <div id="lock-screen">
        <div style="width: 100%; max-width: 320px; text-align: center;">
            <h1 style="margin-bottom: 20px;">FinNotes <span style="color:var(--ac)">Pro</span></h1>
            <input type="password" id="main-login-pwd" placeholder="SENHA" style="text-align: center; letter-spacing: 8px;">
            <button onclick="checkLogin()" style="width:100%; padding:18px; margin-top:20px; background:var(--ac); border:none; border-radius:14px; color:white; font-weight:800;">ACESSAR</button>
        </div>
    </div>

    <div id="app">
        <div id="install-row">
            <span style="font-size: 13px; font-weight: 700;">Instalar App?</span>
            <button onclick="installApp()" style="background: var(--ac); border: none; padding: 8px 16px; border-radius: 8px; color: white; font-weight: 800;">INSTALAR</button>
        </div>
        <div class="dashboard">
            <span style="font-size: 12px; color: var(--t3); font-weight: 800;">TOTAL DE INFRA</span>
            <div id="total-geral" class="total-valor">R$ 0,00</div>
            <div class="progress-bg"><div id="total-progress" class="progress-fill"></div></div>
        </div>
        <div id="notes-list"></div>
        <button class="fab" onclick="openModal('modal-add')">+</button>
    </div>

    <div class="modal" id="modal-add">
        <div class="dashboard" style="width:100%; max-width:400px; margin:0;">
            <h3>Novo Registro</h3>
            <input type="text" id="in-nome" placeholder="Descrição">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                <input type="number" id="in-valor1" placeholder="Original">
                <select id="in-parcelas"></select>
            </div>
            <input type="number" id="in-valor2" placeholder="Total c/ Taxas" step="0.01">
            <select id="in-cat">
                <option value="Infraestrutura">🏠 Infraestrutura</option>
                <option value="Hardware">💻 Hardware</option>
            </select>
            <button onclick="saveNote()" style="width:100%; padding:16px; margin-top:20px; background:var(--ac); border:none; border-radius:12px; color:white; font-weight:bold;">GRAVAR</button>
            <button onclick="closeModal('modal-add')" style="width:100%; background:none; border:none; color:var(--t3); margin-top:10px;">Voltar</button>
        </div>
    </div>

    <div class="modal" id="modal-pwd">
        <div class="dashboard" style="width:320px; text-align:center; margin:0;">
            <h3 id="pwd-title">Confirmar</h3>
            <input type="password" id="confirm-pwd" placeholder="••••••" style="text-align:center; font-size:28px; letter-spacing:6px;">
            <button id="pwd-confirm-btn" style="width:100%; padding:18px; margin-top:20px; background:var(--ok); border:none; border-radius:14px; color:white; font-weight:800;">VALIDAR</button>
            <button onclick="closeModal('modal-pwd')" style="width:100%; background:none; border:none; color:var(--t3); margin-top:10px;">Abortar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
