<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinNotes Ultra</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #09090b;
            --card: #18181b;
            --accent: #3b82f6;
            --text: #f4f4f5;
            --text-dim: #a1a1aa;
            --radius: 18px;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        #root {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Glassmorphism Effect */
        .glass {
            background: rgba(24, 24, 27, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius);
        }

        .btn-add {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 20px;
            background: var(--accent);
            color: white;
            border: none;
            font-size: 30px;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
            cursor: pointer;
            z-index: 100;
        }

        .card-finance {
            padding: 20px;
            margin-bottom: 15px;
            transition: transform 0.2s ease;
        }

        .card-finance:active { transform: scale(0.98); }

        .progress-bar {
            height: 6px;
            background: #27272a;
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #27272a;
            border: 1px solid #3f3f46;
            color: white;
            border-radius: 10px;
            font-size: 16px;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 200;
        }
    </style>
</head>
<body>
    <div id="root">
        <div style="padding: 50px; text-align: center; color: #555;">Carregando interface surreal...</div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [notes, setNotes] = useState(() => {
                const saved = localStorage.getItem('finnotes_data');
                return saved ? JSON.parse(saved) : [];
            });
            const [showModal, setShowModal] = useState(false);

            useEffect(() => {
                localStorage.setItem('finnotes_data', JSON.stringify(notes));
            }, [notes]);

            const addNote = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const newNote = {
                    id: Date.now(),
                    nome: formData.get('nome'),
                    valor: parseFloat(formData.get('valor')),
                    parcelas: parseInt(formData.get('parcelas')),
                    pagas: 0
                };
                setNotes([newNote, ...notes]);
                setShowModal(false);
            };

            const toggleParcela = (noteId) => {
                setNotes(notes.map(n => {
                    if(n.id === noteId) {
                        return { ...n, pagas: n.pagas < n.parcelas ? n.pagas + 1 : 0 };
                    }
                    return n;
                }));
            };

            const totalComprometido = notes.reduce((acc, curr) => acc + curr.valor, 0);

            return (
                <div>
                    <header style={{ marginBottom: 30 }}>
                        <h1 style={{ fontSize: '28px', fontWeight: '800', margin: 0 }}>Fin<span style={{ color: 'var(--accent)' }}>Notes</span></h1>
                        <p style={{ color: 'var(--text-dim)', fontSize: '14px' }}>Gestão de Fluxo Pessoal</p>
                    </header>

                    <div className="glass" style={{ padding: '25px', marginBottom: '30px', textAlign: 'center' }}>
                        <span style={{ fontSize: '12px', color: 'var(--text-dim)', textTransform: 'uppercase' }}>Total em Aberto</span>
                        <div style={{ fontSize: '32px', fontWeight: '800', marginTop: '5px' }}>
                            {new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(totalComprometido)}
                        </div>
                    </div>

                    <h3 style={{ fontSize: '14px', color: 'var(--text-dim)', marginBottom: '15px' }}>SUAS NOTAS</h3>

                    {notes.map(note => (
                        <div key={note.id} className="glass card-finance" onClick={() => toggleParcela(note.id)}>
                            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '5px' }}>
                                <span style={{ fontWeight: '600' }}>{note.nome}</span>
                                <span style={{ color: 'var(--accent)', fontWeight: '700' }}>R$ {note.valor.toFixed(2)}</span>
                            </div>
                            <div style={{ fontSize: '12px', color: 'var(--text-dim)' }}>
                                Parcela {note.pagas} de {note.parcelas}
                            </div>
                            <div className="progress-bar">
                                <div className="progress-fill" style={{ width: `${(note.pagas / note.parcelas) * 100}%` }}></div>
                            </div>
                        </div>
                    ))}

                    <button className="btn-add" onClick={() => setShowModal(true)}>+</button>

                    {showModal && (
                        <div className="modal-overlay">
                            <form className="glass" onSubmit={addNote} style={{ padding: '30px', width: '100%' }}>
                                <h2 style={{ marginTop: 0 }}>Nova Despesa</h2>
                                <input name="nome" placeholder="Ex: Notebook Novo" required />
                                <input name="valor" type="number" step="0.01" placeholder="Valor Total (R$)" required />
                                <input name="parcelas" type="number" placeholder="Nº de Parcelas" required />
                                <div style={{ display: 'flex', gap: '10px', marginTop: '20px' }}>
                                    <button type="button" onClick={() => setShowModal(false)} style={{ flex: 1, padding: '12px', background: 'transparent', border: '1px solid #3f3f46', color: 'white', borderRadius: '10px' }}>Cancelar</button>
                                    <button type="submit" style={{ flex: 1, padding: '12px', background: 'var(--accent)', border: 'none', color: 'white', borderRadius: '10px', fontWeight: 'bold' }}>Salvar</button>
                                </div>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
