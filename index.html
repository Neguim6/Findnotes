<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#09090b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>FinNotes Ultra</title>
    <link rel="manifest" href="manifest.json" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --z: #09090b; --z1: #111113; --z2: #18181b; --z3: #1f1f23;
            --z4: #27272a; --z5: #3f3f46; --z6: #52525b;
            --t1: #fafafa; --t2: #a1a1aa; --t3: #71717a;
            --ac: #3b82f6; --ac-a: #3b82f614;
            --ok: #22c55e; --ok-a: #22c55e18;
            --r: 14px; --r2: 20px;
            --ff: 'Geist', system-ui, -apple-system, sans-serif;
        }

        body { background: var(--z); color: var(--t1); font-family: var(--ff); min-height: 100dvh; padding: 15px; display: flex; justify-content: center; -webkit-font-smoothing: antialiased; }
        #app { width: 100%; max-width: 600px; padding-bottom: 100px; }

        /* Responsividade do Dashboard */
        .dashboard { background: var(--z2); padding: clamp(15px, 5vw, 24px); border-radius: var(--r2); border: 1px solid var(--z3); margin-bottom: 20px; animation: fadeUp 0.4s ease; }
        .total-valor { font-size: clamp(24px, 8vw, 34px); font-weight: 800; margin: 6px 0; letter-spacing: -1px; }

        .progress-bg { height: 6px; background: var(--z3); border-radius: 99px; margin-top: 12px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--ac); transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }

        /* Cards Responsivos */
        .card { background: var(--z2); border: 1px solid var(--z3); border-radius: var(--r); padding: 18px; margin-bottom: 12px; position: relative; overflow: hidden; animation: fadeUp 0.3s ease forwards; transition: all 0.2s; cursor: pointer; }
        .card:active { transform: scale(0.98); }
        .card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--color); }
        
        .card.is-paid { border-color: var(--ok-a); background: #111b14; }
        .paid-stamp { font-size: 10px; font-weight: 900; color: var(--ok); border: 1px solid var(--ok); padding: 2px 6px; border-radius: 4px; text-transform: uppercase; margin-left: 8px; white-space: nowrap; }

        .badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 99px; background: var(--bg); color: var(--color); border: 1px solid rgba(255,255,255,0.05); text-transform: uppercase; }

        /* Formulário Responsivo */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        @media (max-width: 400px) { .form-grid { grid-template-columns: 1fr; } }

        input, select { width: 100%; background: var(--z1); border: 1.5px solid var(--z4); border-radius: 10px; color: var(--t1); padding: 12px; margin-top: 6px; outline: none; font-size: 15px; }
        input:focus { border-color: var(--ac); box-shadow: 0 0 0 3px var(--ac-a); }

        #install-btn { display: none; width: 100%; background: var(--ok-a); color: var(--ok); border: 1px solid #22c55e40; padding: 14px; border-radius: 12px; margin-bottom: 20px; font-weight: 700; cursor: pointer; }

        .fab { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 60px; height: 60px; background: var(--ac); color: white; border-radius: 20px; border: none; font-size: 30px; box-shadow: 0 8px 20px rgba(0,0,0,0.5); z-index: 100; cursor: pointer; }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; padding: 15px; z-index: 200; backdrop-filter: blur(8px); }
        .modal.active { display: flex; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="app">
        <header style="margin-bottom: 25px; text-align: center;">
            <h1 style="font-size: 28px; font-weight: 800; letter-spacing: -1px;">Fin<span style="color:var(--ac)">Notes</span></h1>
            <p style="color:var(--t3); font-size: 11px; text-transform: uppercase; letter-spacing: 1px;">Technical Infrastructure v4.4</p>
        </header>

        <button id="install-btn">📲 INSTALAR NO TELEMÓVEL</button>

        <div class="dashboard">
            <div style="font-size: 11px; color: var(--t3); text-transform: uppercase; font-weight: 700;">Comprometido Total</div>
            <div id="total-geral" class="total-valor">R$ 0,00</div>
            <div style="display: flex; justify-content: space-between; font-size: 12px; color: var(--t3);">
                <span id="label-pagas">Pagas: R$ 0</span>
                <span id="label-pct" style="font-weight: 800; color: var(--ac);">0%</span>
            </div>
            <div class="progress-bg"><div id="total-progress" class="progress-fill" style="width: 0%"></div></div>
        </div>

        <div id="notes-list"></div>

        <button class="fab" onclick="toggleModal(true)">+</button>
    </div>

    <div class="modal" id="modal">
        <div class="dashboard" style="width: 100%; max-width: 450px; margin-bottom: 0;">
            <h2 style="margin-bottom: 20px; font-size: 20px; font-weight: 800;">Novo Lançamento</h2>
            
            <label style="font-size: 11px; font-weight: 700; color: var(--t3);">NOME DO ITEM / SERVIÇO</label>
            <input type="text" id="in-nome" placeholder="Ex: Roteador Aruba AP">

            <div class="form-grid">
                <div>
                    <label style="font-size: 11px; font-weight: 700; color: var(--t3);">VALOR BASE (R$)</label>
                    <input type="number" id="in-valor" placeholder="0.00" oninput="calcJuros()">
                </div>
                <div>
                    <label style="font-size: 11px; font-weight: 700; color: var(--t3);">PARCELAS</label>
                    <select id="in-parcelas" onchange="calcJuros()">
                        <option value="1">À vista</option>
                        <option value="2">2x</option>
                        <option value="3">3x</option>
                        <option value="4">4x</option>
                        <option value="6">6x</option>
                        <option value="10">10x</option>
                        <option value="12">12x</option>
                    </select>
                </div>
            </div>

            <div style="margin-top: 15px;">
                <label style="font-size: 11px; font-weight: 700; color: var(--t3);">VALOR TOTAL FINAL (EDITÁVEL)</label>
                <input type="number" id="in-total" step="0.01" placeholder="0.00" style="background: var(--z1); border-color: var(--ac);">
            </div>

            <div style="margin-top: 15px;">
                <label style="font-size: 11px; font-weight: 700; color: var(--t3);">CATEGORIA</label>
                <select id="in-cat">
                    <option value="Infraestrutura">🏠 Infraestrutura</option>
                    <option value="Alimentação">🍽 Alimentação</option>
                    <option value="Saúde">💊 Saúde</option>
                    <option value="Lazer">🎮 Lazer</option>
                    <option value="Outros">📦 Outros</option>
                </select>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 25px;">
                <button onclick="toggleModal(false)" style="flex:1; padding:14px; background:transparent; border:1px solid var(--z5); color:var(--t2); border-radius:12px; font-weight:bold; cursor:pointer;">Cancelar</button>
                <button onclick="saveNote()" style="flex:1; padding:14px; background:var(--ac); border:none; color:white; border-radius:12px; font-weight:bold; cursor:pointer;">Confirmar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
