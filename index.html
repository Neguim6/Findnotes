<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinNotes — Controle Financeiro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="update-banner" class="update-banner hidden">
        <span>Nova versão disponível!</span>
        <button id="update-btn">Atualizar agora</button>
    </div>

    <div class="app-shell">
        <header class="app-header">
            <div class="header-inner">
                <div class="logo">
                    <span class="logo-icon">⚡</span>
                    <span class="logo-text">Fin<em>Notes</em></span>
                </div>
                <div id="note-count" class="header-meta">0 notas</div>
            </div>
        </header>

        <main class="main-content">
            <section class="dashboard">
                <div class="total-card">
                    <div class="card-label">Total Acumulado</div>
                    <div id="total-geral" class="card-value">R$ 0,00</div>
                    <div id="total-sub" class="card-sub">nenhuma anotação ainda</div>
                    <div class="card-glow"></div>
                </div>

                <div class="dashboard-stats">
                    <div class="stat-pill"><span class="stat-dot" style="background:var(--cat-alimentacao)"></span><span class="stat-name">Alimentação</span><span id="val-alimentacao" class="stat-val">R$ 0</span></div>
                    <div class="stat-pill"><span class="stat-dot" style="background:var(--cat-saude)"></span><span class="stat-name">Saúde</span><span id="val-saude" class="stat-val">R$ 0</span></div>
                    <div class="stat-pill"><span class="stat-dot" style="background:var(--cat-lazer)"></span><span class="stat-name">Lazer</span><span id="val-lazer" class="stat-val">R$ 0</span></div>
                    <div class="stat-pill"><span class="stat-dot" style="background:var(--cat-infraestrutura)"></span><span class="stat-name">Infra</span><span id="val-infraestrutura" class="stat-val">R$ 0</span></div>
                    <div class="stat-pill"><span class="stat-dot" style="background:var(--cat-outros)"></span><span class="stat-name">Outros</span><span id="val-outros" class="stat-val">R$ 0</span></div>
                </div>
            </section>

            <section class="form-section">
                <div class="section-header">
                    <h2>Nova Anotação</h2>
                    <div class="section-line"></div>
                </div>
                <div class="form-card">
                    <div class="form-grid">
                        <div class="field-group col-span-2">
                            <label>Nome do Gasto</label>
                            <input type="text" id="nome" placeholder="Ex: Upgrade de Servidor">
                        </div>
                        <div class="field-group">
                            <label>Data</label>
                            <input type="date" id="data">
                        </div>
                        <div class="field-group">
                            <label>Categoria</label>
                            <select id="categoria">
                                <option value="Alimentação">Alimentação</option>
                                <option value="Saúde">Saúde</option>
                                <option value="Lazer">Lazer</option>
                                <option value="Infraestrutura">Infraestrutura</option>
                                <option value="Outros" selected>Outros</option>
                            </select>
                        </div>
                        <div class="field-group col-span-2">
                            <label>Descrição</label>
                            <textarea id="descricao" placeholder="Detalhes opcionais..."></textarea>
                        </div>
                        <div class="field-group">
                            <label>Parcelas</label>
                            <select id="parcelas">
                                <option value="1">À vista (1x)</option>
                                <option value="2">2x</option>
                                <option value="3">3x</option>
                                <option value="4">4x</option>
                                <option value="5">5x</option>
                                <option value="6">6x</option>
                                <option value="7">7x</option>
                                <option value="8">8x</option>
                                <option value="9">9x</option>
                                <option value="10">10x</option>
                                <option value="11">11x</option>
                                <option value="12">12x</option>
                            </select>
                        </div>
                        <div class="field-group">
                            <label>Valor Real (Sem Juros)</label>
                            <input type="number" id="valor-real" step="0.01" placeholder="0,00">
                        </div>
                        <div class="field-group col-span-2">
                            <label>Valor Total com Juros <span id="juros-badge" class="juros-badge" style="display:none"></span></label>
                            <input type="number" id="valor-juros" step="0.01" placeholder="0,00">
                            <div id="parcela-hint" class="field-hint"></div>
                        </div>
                    </div>
                    <div class="form-actions">
                        <button id="btn-clear" class="btn-clear">Limpar</button>
                        <button id="btn-save" class="btn-save">
                            <span class="btn-icon">+</span> Salvar Nota
                        </button>
                    </div>
                </div>
            </section>

            <section class="list-section">
                <div class="section-header">
                    <h2>Histórico</h2>
                    <div class="filter-tabs">
                        <button class="filter-tab active" data-filter="todas">Todas</button>
                        <button class="filter-tab" data-filter="Alimentação">Alimentação</button>
                        <button class="filter-tab" data-filter="Infraestrutura">Infra</button>
                    </div>
                </div>
                
                <div id="notes-list" class="notes-list">
                    <div id="empty-state" class="empty-state">
                        <div class="empty-icon">📂</div>
                        <p>Nenhuma nota encontrada</p>
                        <span>Comece adicionando um gasto acima</span>
                    </div>
                </div>
            </section>
        </main>

        <footer class="app-footer">
            FinNotes v2.0 — Sistema de Uso Pessoal
        </footer>
    </div>

    <div id="toast" class="toast"></div>
    <script src="script.js"></script>
</body>
</html>
