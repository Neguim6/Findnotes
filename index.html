<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#09090b" />
  <meta name="description" content="FinNotes — Controle financeiro com parcelamentos." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FinNotes" />
  <title>FinNotes</title>
  
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --z:  #09090b; --z1: #111113; --z2: #18181b; --z3: #1f1f23;
      --z4: #27272a; --z5: #3f3f46; --z6: #52525b;
      --t1: #fafafa; --t2: #a1a1aa; --t3: #71717a; --t4: #3f3f46;
      --ac: #3b82f6; --ac2: #60a5fa; --ac3: #1d4ed8; --ac-a: #3b82f614;
      --ok: #22c55e; --ok2: #16a34a; --ok-a: #22c55e18;
      --warn: #f59e0b; --warn-a: #f59e0b18;
      --r: 10px; --r2: 14px; --r3: 18px;
      --ff: 'Geist', system-ui, sans-serif; --fm: 'Geist Mono', monospace;
    }
    html { font-size: 15px; scroll-behavior: smooth; }
    body { background: var(--z); color: var(--t1); font-family: var(--ff); min-height: 100dvh; -webkit-font-smoothing: antialiased; }
    #root { min-height: 100dvh; }
    .hidden { display: none !important; }
    
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn { from{opacity:0}to{opacity:1} }
    @keyframes checkPop { 0%{transform:scale(0)}60%{transform:scale(1.25)}100%{transform:scale(1)} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-5px)} 60%{transform:translateX(5px)} 80%{transform:translateX(3px)} }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    const STORAGE_KEY = 'finnotes_v4';
    const RATE = 0.02;

    const CATS = [
      { id:'Alimentação',    icon:'🍽', color:'#f97316', bg:'#431407' },
      { id:'Saúde',          icon:'💊', color:'#22d3ee', bg:'#083344' },
      { id:'Lazer',          icon:'🎮', color:'#a78bfa', bg:'#2e1065' },
      { id:'Infraestrutura', icon:'🏠', color:'#34d399', bg:'#052e16' },
      { id:'Outros',          icon:'📦', color:'#94a3b8', bg:'#1e293b' },
    ];

    const fmt = v => (v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
    const today = () => { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; };

    function App() {
      const [notes, setNotes] = useState(() => {
        try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
        catch { return []; }
      });

      useEffect(() => {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
      }, [notes]);

      return (
        <div style={{ padding: '20px', maxWidth: '600px', margin: '0 auto', animation: 'fadeIn 0.5s ease' }}>
          <header style={{ marginBottom: '30px', textAlign: 'center' }}>
            <h1 style={{ fontSize: '24px', fontWeight: '700', color: 'var(--ac2)' }}>FinNotes</h1>
            <p style={{ color: 'var(--t3)', fontSize: '14px' }}>Controle Financeiro PWA</p>
          </header>

          <main>
            {/* O conteúdo do seu Dashboard e Lista de Notas entra aqui */}
            <div style={{ background: 'var(--z2)', padding: '20px', borderRadius: 'var(--r2)', border: '1px solid var(--z4)' }}>
              <p style={{ textAlign: 'center', color: 'var(--t2)' }}>
                {notes.length === 0 ? "Nenhuma nota encontrada. Comece a adicionar!" : `Você tem ${notes.length} notas.`}
              </p>
            </div>
          </main>

          <footer style={{ marginTop: '40px', textAlign: 'center', fontSize: '12px', color: 'var(--t4)' }}>
            <p>FinNotes · Versão 4.0</p>
          </footer包
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(reg => console.log('PWA: Service Worker Ativo'))
          .catch(err => console.error('PWA: Erro no SW', err));
      });
    }
  </script>
</body>
</html>
